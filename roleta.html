<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#C8B091">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Sonho dos Pés">
    <meta name="description" content="Roleta da sorte - Sonho dos Pés">

    <title>Sonho dos Pés - Roleta</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="apple-touch-icon" href="logo.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="roleta.css">
</head>
<body class="roleta-body">
    <div class="roulette-app">
        <header class="roulette-topbar">
            <a class="roulette-icon-link" href="/" aria-label="Voltar para consulta">
                <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6"/>
                </svg>
            </a>

            <div class="roulette-brand">
                <img src="logo.svg" alt="Sonho dos Pés" class="roulette-logo">
                <p class="roulette-kicker">Roleta da Sorte</p>
            </div>

            <button class="roulette-icon-btn" id="refreshBtn" aria-label="Atualizar roleta">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 0 1-15.1 6.6"/>
                    <path d="M3 12a9 9 0 0 1 15.1-6.6"/>
                    <path d="M6 19H3v-3"/>
                    <path d="M18 5h3v3"/>
                </svg>
            </button>
        </header>

        <main class="roulette-main">
            <section class="roulette-stage" aria-label="Roleta da Sorte">
                <div class="wheel-area" id="wheelArea">
                    <div class="wheel-energy" aria-hidden="true"></div>
                    <div class="wheel-pointer" aria-hidden="true">
                        <svg width="34" height="38" viewBox="0 0 34 38" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17 37L2.27757 8.5L17 1L31.7224 8.5L17 37Z" fill="currentColor"/>
                        </svg>
                    </div>

                    <div class="wheel-shell">
                        <div class="roulette-wheel" id="wheel">
                            <div class="wheel-gloss" aria-hidden="true"></div>
                            <div class="wheel-center">
                                <span class="wheel-monogram">S</span>
                                <span class="wheel-center-copy">Sonho dos Pés</span>
                            </div>
                        </div>
                    </div>
                </div>

                <button class="spin-btn" id="spinBtn" disabled>
                    <span id="spinBtnText">Girar roleta</span>
                </button>

                <div class="result-panel" id="resultPanel" hidden>
                    <span class="result-label">Resultado</span>
                    <strong id="resultPrize"></strong>
                </div>
            </section>

            <section class="roulette-list-panel" aria-labelledby="prizeListTitle">
                <div class="prize-list-header">
                    <h2 id="prizeListTitle">Prêmios</h2>
                </div>
                <div class="prize-list" id="prizeList"></div>
            </section>
        </main>
    </div>

    <div class="celebration-layer" id="celebrationLayer" aria-hidden="true"></div>
    <div class="toast" id="rouletteToast" hidden></div>

    <script src="roleta.js"></script>
</body>
</html>
